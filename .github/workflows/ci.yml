name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [transaction, eventbus, logging, conf, outbox, outbox/gowaymigrator, sqlbus, sqlbus/gowaymigrator, transaction/integration]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -count=1

  zero-dependency-core:
    name: zero-dependency core (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [transaction, eventbus, logging]
    steps:
      - uses: actions/checkout@v4
      - name: assert go.mod has no require directive
        run: |
          if grep -qE '^[[:space:]]*require' "${{ matrix.module }}/go.mod"; then
            echo "::error::${{ matrix.module }}/go.mod must have no require directive (zero-dependency core)"
            exit 1
          fi
          echo "${{ matrix.module }}: zero-dependency core OK"

  conf-single-dependency:
    name: conf confined to jsonschema-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: conf/go.mod
      - name: assert conf requires only google/jsonschema-go
        run: |
          extra="$(go mod edit -json conf/go.mod | jq -r '.Require[]?.Path' | grep -v '^github.com/google/jsonschema-go$' || true)"
          if [ -n "$extra" ]; then
            echo "::error::conf/go.mod must require only github.com/google/jsonschema-go; found: $extra"
            exit 1
          fi
          echo "conf: single-dependency (jsonschema-go) OK"

  goway-isolation:
    name: goway confined to the adapter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cores must not reference goway
        run: |
          for core in outbox sqlbus; do
            if grep -q 'github.com/cgardev/goway' "$core/go.mod"; then
              echo "::error::$core/go.mod must not reference goway; it belongs only in $core/gowaymigrator"
              exit 1
            fi
            echo "$core core: no goway OK"
          done
      - name: adapters must require goway
        run: |
          for adapter in outbox/gowaymigrator sqlbus/gowaymigrator; do
            if ! grep -q 'github.com/cgardev/goway' "$adapter/go.mod"; then
              echo "::error::$adapter/go.mod must require goway"
              exit 1
            fi
          done
          echo "goway isolation OK"

  integration:
    name: integration (postgres + sqlite)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [transaction/integration, outbox, sqlbus]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
      - run: go test -tags=integration ./... -count=1
